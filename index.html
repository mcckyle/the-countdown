<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <title>Earth Day Countdown • April 22, 2026</title>
    <meta
      name="description"
      content="A simple, modern countdown to Earth Day on April 22, 2026."
